<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Health Tracker</title>
<style>
:root {
  --bg: linear-gradient(135deg, #b2e8dc 0%, #8dd8c8 50%, #a0e0d0 100%);
  --bg-solid: #a0e0d0;
  --card: rgba(255,255,255,0.9);
  --text: #1a2e2a;
  --text2: #4a6e62;
  --border: #90ccbb;
  --accent: #e87a20;
  --accent2: #d06a10;
  --green: #2abb6a;
  --yellow: #e8a820;
  --red: #d94040;
  --coral: #e87a20;
  --coral2: #d06a10;
  --check-bg: rgba(232,122,32,0.06);
  --progress-bg: #a8d4c6;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  background-attachment: fixed;
  color: var(--text);
  max-width: 480px;
  margin: 0 auto;
  padding: 16px;
  min-height: 100vh;
}
h1 { font-size: 1.4rem; font-weight: 700; background: linear-gradient(135deg, #e87a20, #c45e10); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 8px; }
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.header-left { display: flex; align-items: center; gap: 8px; }
.gear-btn, .cal-btn {
  background: none;
  border: none;
  color: var(--text2);
  font-size: 1.3rem;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 6px;
}
.gear-btn:hover, .cal-btn:hover { background: var(--border); }
.details-wrap { position: relative; }
.details-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--accent);
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  padding: 4px 10px;
  border-radius: 6px;
}
.details-btn:hover { background: var(--check-bg); }
.details-dropdown {
  display: none;
  position: absolute;
  top: 100%;
  left: 0;
  margin-top: 4px;
  background: var(--card);
  border-radius: 10px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  min-width: 220px;
  z-index: 50;
  overflow: hidden;
}
.details-dropdown.open { display: block; }
.details-dropdown a {
  display: block;
  padding: 10px 14px;
  font-size: 0.85rem;
  color: var(--text);
  text-decoration: none;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
}
.details-dropdown a:last-child { border-bottom: none; }
.details-dropdown a:hover { background: var(--check-bg); }
.doc-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  z-index: 100;
  align-items: flex-start;
  justify-content: center;
  padding: 20px;
  overflow-y: auto;
}
.doc-overlay.open { display: flex; }
.doc-viewer {
  background: var(--card);
  border-radius: 12px;
  padding: 20px;
  width: 100%;
  max-width: 600px;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  margin-top: 20px;
}
.doc-viewer h2 { margin-bottom: 12px; }
.doc-viewer pre {
  white-space: pre-wrap;
  word-wrap: break-word;
  font-size: 0.82rem;
  line-height: 1.6;
  color: var(--text);
  font-family: inherit;
}
.doc-viewer .doc-close {
  float: right;
  background: none;
  border: none;
  font-size: 1.4rem;
  cursor: pointer;
  color: var(--text2);
  padding: 0 4px;
  line-height: 1;
}
.doc-viewer .doc-close:hover { color: var(--text); }
.nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-bottom: 16px;
  background: var(--card);
  backdrop-filter: blur(10px);
  padding: 10px 16px;
  border-radius: 10px;
  box-shadow: var(--shadow);
}
.nav button {
  background: none;
  border: none;
  color: var(--accent);
  font-size: 1.3rem;
  cursor: pointer;
  padding: 4px 10px;
  border-radius: 6px;
  font-weight: 700;
}
.nav button:hover { background: var(--check-bg); }
.nav .date-display {
  font-size: 1rem;
  font-weight: 600;
  min-width: 160px;
  text-align: center;
}
.nav .today-btn {
  font-size: 0.75rem;
  font-weight: 600;
  padding: 3px 8px;
  background: linear-gradient(135deg, #e87a20, #c45e10);
  color: #fff;
  border-radius: 4px;
  border: none;
  cursor: pointer;
}
.nav .today-btn:hover { opacity: 0.85; }
.week-badge {
  text-align: center;
  font-size: 0.85rem;
  color: var(--text2);
  margin-bottom: 12px;
}
.week-badge strong { color: var(--accent); }
.progress-section {
  background: var(--card);
  border-radius: 10px;
  padding: 14px 16px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}
.progress-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.progress-count { font-weight: 700; font-size: 1rem; }
.progress-pct { font-size: 0.85rem; color: var(--text2); }
.progress-bar {
  width: 100%;
  height: 8px;
  background: var(--progress-bg);
  border-radius: 4px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.3s, background 0.3s;
}
.streak {
  text-align: center;
  font-size: 0.85rem;
  color: var(--text2);
  margin-bottom: 16px;
}
.streak strong { color: var(--accent); }
.checklist {
  background: var(--card);
  border-radius: 10px;
  box-shadow: var(--shadow);
  overflow: hidden;
  margin-bottom: 16px;
}
.check-item {
  display: flex;
  align-items: center;
  padding: 14px 16px;
  gap: 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
  -webkit-user-select: none;
  user-select: none;
}
.check-item:last-child { border-bottom: none; }
.check-item:hover { background: var(--check-bg); }
.check-item.checked { opacity: 0.6; }
.check-box {
  width: 26px;
  height: 26px;
  border: 2px solid var(--border);
  border-radius: 6px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  font-size: 0.9rem;
}
.check-item.checked .check-box {
  background: var(--green);
  border-color: var(--green);
  color: #fff;
}
.check-label { font-size: 0.95rem; }
.check-details {
  display: none;
  padding: 0 16px 12px 56px;
  border-bottom: 1px solid var(--border);
}
.check-details.open { display: block; }
.check-details ul {
  list-style: none;
  padding: 0;
  margin: 0;
}
.check-details li {
  font-size: 0.82rem;
  color: var(--text2);
  padding: 3px 0;
  line-height: 1.4;
}
.check-details li::before {
  content: '>';
  color: var(--accent);
  font-weight: 700;
  margin-right: 6px;
}
/* CBT forms */
.cbt-form {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.cbt-form label {
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--text);
}
.cbt-form textarea, .cbt-form select, .cbt-form input[type="text"] {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 0.85rem;
  font-family: inherit;
  background: rgba(255,255,255,0.6);
  color: var(--text);
  resize: vertical;
}
.cbt-form textarea { min-height: 50px; }
.cbt-form textarea:focus, .cbt-form select:focus, .cbt-form input:focus {
  outline: 2px solid var(--accent);
  outline-offset: -1px;
}
.cbt-form .field-row {
  display: flex;
  gap: 8px;
}
.cbt-form .field-row > div { flex: 1; }
.cbt-form .pill-group {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.cbt-form .pill {
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 0.78rem;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.5);
  cursor: pointer;
  color: var(--text2);
  transition: all 0.15s;
}
.cbt-form .pill.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.cbt-form .urge-scale {
  display: flex;
  gap: 4px;
  align-items: center;
}
.cbt-form .urge-num {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  cursor: pointer;
  transition: all 0.15s;
}
.cbt-form .urge-num.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.cbt-form .cbt-saved {
  font-size: 0.75rem;
  color: var(--green);
  font-weight: 600;
}
.cbt-form .cbt-entries {
  margin-top: 6px;
  border-top: 1px solid var(--border);
  padding-top: 6px;
}
.cbt-form .cbt-entry {
  font-size: 0.78rem;
  color: var(--text2);
  padding: 4px 0;
  border-bottom: 1px dashed var(--border);
  line-height: 1.4;
}
.cbt-form .cbt-entry:last-child { border-bottom: none; }
.cbt-form .cbt-entry strong { color: var(--text); }
.cbt-form .add-entry-btn {
  padding: 6px 14px;
  border: 1px dashed var(--accent);
  border-radius: 6px;
  background: none;
  color: var(--accent);
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  width: 100%;
}
.cbt-form .add-entry-btn:hover { background: var(--check-bg); }

.check-expand {
  margin-left: auto;
  font-size: 0.75rem;
  color: var(--text2);
  transition: transform 0.2s;
  flex-shrink: 0;
}
.check-expand.open { transform: rotate(90deg); }
.check-week {
  font-size: 0.7rem;
  color: var(--text2);
  white-space: nowrap;
  flex-shrink: 0;
}

/* Settings modal */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--card);
  border-radius: 12px;
  padding: 24px;
  width: 90%;
  max-width: 400px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
}
.modal h2 { margin-bottom: 16px; }
.modal label {
  display: block;
  font-size: 0.85rem;
  color: var(--text2);
  margin-bottom: 4px;
}
.modal input[type="date"] {
  width: 100%;
  padding: 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 1rem;
  background: var(--bg);
  color: var(--text);
  margin-bottom: 16px;
}
.modal .btn-row {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}
.btn {
  padding: 8px 18px;
  border: none;
  border-radius: 8px;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent2); }
.btn-secondary { background: var(--progress-bg); color: var(--text); }
.btn-secondary:hover { background: var(--border); }
.btn-danger { background: var(--red); color: #fff; }
.btn-danger:hover { opacity: 0.85; }

/* History calendar */
.history-section {
  display: none;
  margin-bottom: 16px;
}
.history-section.open { display: block; }
.history-card {
  background: var(--card);
  border-radius: 10px;
  padding: 16px;
  box-shadow: var(--shadow);
}
.history-month-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.history-month-nav button {
  background: none;
  border: none;
  color: var(--accent);
  font-size: 1.2rem;
  cursor: pointer;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 6px;
}
.history-month-nav button:hover { background: var(--check-bg); }
.history-month-nav span { font-weight: 600; font-size: 0.95rem; }
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}
.cal-header {
  font-size: 0.7rem;
  text-align: center;
  color: var(--text2);
  font-weight: 600;
  padding: 4px 0;
}
.cal-day {
  aspect-ratio: 1;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--text);
}
.cal-day.empty { background: transparent; }
.cal-day.no-data { background: var(--progress-bg); opacity: 0.4; }
.cal-day.red { background: #fecaca; color: #991b1b; }
.cal-day.yellow { background: #fef3c7; color: #854d0e; }
.cal-day.green { background: #fed7aa; color: #9a3412; }
@media (prefers-color-scheme: dark) {
  .cal-day.red { background: #5a1a1a; color: #fca5a5; }
  .cal-day.yellow { background: #5a4a0a; color: #fde047; }
  .cal-day.green { background: #4a2510; color: #fdba74; }
}
.cal-day.today { outline: 2px solid var(--accent); outline-offset: -1px; }
.cal-legend {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-top: 10px;
  font-size: 0.7rem;
  color: var(--text2);
}
.cal-legend span {
  display: flex;
  align-items: center;
  gap: 4px;
}
.cal-legend .dot {
  width: 10px;
  height: 10px;
  border-radius: 3px;
}
.no-start {
  text-align: center;
  padding: 40px 20px;
  color: var(--text2);
}
.no-start button {
  margin-top: 12px;
}
/* Profile picker */
.profile-screen {
  text-align: center;
  padding: 60px 20px;
}
.profile-screen h2 { margin-bottom: 8px; }
.profile-screen p { color: var(--text2); font-size: 0.9rem; margin-bottom: 20px; }
.profile-screen input[type="text"] {
  width: 100%;
  max-width: 260px;
  padding: 12px 14px;
  border: 2px solid var(--border);
  border-radius: 10px;
  font-size: 1.1rem;
  text-align: center;
  background: rgba(255,255,255,0.6);
  color: var(--text);
  margin-bottom: 12px;
}
.profile-screen input[type="text"]:focus {
  outline: none;
  border-color: var(--accent);
}
.profile-screen .existing-profiles {
  margin-top: 20px;
}
.profile-screen .existing-profiles p {
  font-size: 0.8rem;
  margin-bottom: 8px;
}
.profile-screen .profile-list {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}
.profile-screen .profile-chip {
  padding: 8px 16px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--card);
  cursor: pointer;
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text);
  transition: all 0.15s;
}
.profile-screen .profile-chip:hover {
  border-color: var(--accent);
  background: var(--check-bg);
}
/* Settings extras */
.settings-section {
  margin-bottom: 16px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.settings-section:last-child { border-bottom: none; }
.settings-section label { display: block; font-size: 0.85rem; color: var(--text2); margin-bottom: 4px; }
.settings-user {
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 8px;
}
.header-user {
  font-size: 0.75rem;
  color: var(--text2);
  cursor: pointer;
  padding: 2px 8px;
  border-radius: 4px;
}
.header-user:hover { background: var(--border); }
.export-import-row {
  display: flex;
  gap: 8px;
}
.export-import-row .btn { flex: 1; font-size: 0.8rem; padding: 8px 10px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Health Tracker</h1>
    <div class="details-wrap">
      <button class="details-btn" onclick="toggleDetails(event)">Details</button>
      <div class="details-dropdown" id="detailsDropdown">
        <a onclick="openDoc('Eating Guide','docs/eating-guide.txt')">Eating Guide</a>
        <a onclick="openDoc('7-Day Menu','docs/menu.txt')">7-Day Menu</a>
        <a onclick="openDoc('Shopping List','docs/shopping-list.txt')">Shopping List</a>
        <a onclick="openDoc('Quick Reference','docs/quick-reference.txt')">Quick Reference</a>
      </div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:4px">
    <span class="header-user" id="headerUser" onclick="openSettings()" title="Switch profile"></span>
    <button class="cal-btn" onclick="toggleHistory()" title="History">&#x1f4c5;</button>
    <button class="gear-btn" onclick="openSettings()" title="Settings">&#x2699;</button>
  </div>
</div>

<!-- Doc Viewer -->
<div class="doc-overlay" id="docOverlay" onclick="if(event.target===this)closeDoc()">
  <div class="doc-viewer">
    <button class="doc-close" onclick="closeDoc()">&times;</button>
    <h2 id="docTitle"></h2>
    <pre id="docContent">Loading...</pre>
  </div>
</div>

<div id="app"></div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <h2>Settings</h2>
    <div class="settings-section">
      <label>Profile</label>
      <div class="settings-user" id="settingsUser"></div>
      <button class="btn btn-secondary" onclick="switchUser()" style="font-size:0.8rem;padding:6px 12px">Switch Profile</button>
    </div>
    <div class="settings-section">
      <label for="startDateInput">Program Start Date</label>
      <input type="date" id="startDateInput">
    </div>
    <div class="settings-section">
      <label>Data</label>
      <div class="export-import-row">
        <button class="btn btn-primary" onclick="exportData()">Export</button>
        <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()">Import</button>
      </div>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
    </div>
    <div class="settings-section">
      <button class="btn btn-danger" onclick="confirmClear()" style="font-size:0.8rem;padding:6px 12px">Clear All Data</button>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeSettings()">Cancel</button>
      <button class="btn btn-primary" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>

<!-- Profile Picker (shown when no user selected) -->
<div id="profileScreen" style="display:none"></div>

<script>

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function dateKey(d) {
  return d.toISOString().slice(0, 10);
}

function today() {
  const d = new Date();
  return new Date(d.getFullYear(), d.getMonth(), d.getDate());
}

function parseDate(s) {
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function formatDate(d) {
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${days[d.getDay()]}, ${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

function userKey(key) {

function getKnownUsers() {

function addKnownUser(name) {

function getDayData(dateStr) {

    return JSON.parse(localStorage.getItem(userKey('health-' + dateStr))) || {};
  } catch { return {}; }
}

function saveDayData(dateStr, data) {

}

function getWeekNumber(startDate, targetDate) {
  const diffMs = targetDate - startDate;
  if (diffMs < 0) return 0;
  return Math.floor(diffMs / (7 * 24 * 60 * 60 * 1000)) + 1;
}

function getActiveItems(weekNum) {
  return ITEMS.filter(item => weekNum >= item.week);
}

// ---- State ----
let currentDate = today();
let historyOpen = false;
let historyMonth = new Date(today().getFullYear(), today().getMonth(), 1);
let expandedItems = new Set();

// ---- Render ----
function render() {
  const app = document.getElementById('app');
  const settings = getSettings();
  document.getElementById('headerUser').textContent = currentUser;

  if (!settings.startDate) {
    app.innerHTML = `
      <div class="no-start">
        <h2>Welcome</h2>
        <p>Set your program start date to begin tracking.</p>
        <button class="btn btn-primary" onclick="openSettings()">Set Start Date</button>
      </div>`;
    return;
  }

  const startDate = parseDate(settings.startDate);
  const dk = dateKey(currentDate);
  const weekNum = getWeekNumber(startDate, currentDate);
  const activeItems = getActiveItems(weekNum);
  const dayData = getDayData(dk);
  const isToday = dateKey(currentDate) === dateKey(today());
  const isFuture = currentDate > today();

  const checked = activeItems.filter(i => dayData[i.id]).length;
  const total = activeItems.length;
  const pct = total > 0 ? Math.round((checked / total) * 100) : 0;

  let fillColor = 'var(--red)';
  if (pct >= 75) fillColor = 'var(--green)';
  else if (pct >= 40) fillColor = 'var(--yellow)';

  // Streak calculation
  const streak = calcStreak(settings.startDate);

  let html = '';

  // Date nav
  html += `
    <div class="nav">
      <button onclick="prevDay()">&larr;</button>
      <div>
        <div class="date-display">${formatDate(currentDate)}</div>
      </div>
      <button onclick="nextDay()">&rarr;</button>
      ${!isToday ? '<button class="today-btn" onclick="goToday()">Today</button>' : ''}
    </div>`;

  // Week badge
  if (weekNum > 0) {
    html += `<div class="week-badge">Week <strong>${weekNum}</strong> of your program</div>`;
  } else {
    html += `<div class="week-badge" style="color:var(--red)">Before program start</div>`;
  }

  // Progress
  if (weekNum > 0 && !isFuture) {
    html += `
      <div class="progress-section">
        <div class="progress-header">
          <span class="progress-count">${checked} / ${total} completed</span>
          <span class="progress-pct">${pct}%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" style="width:${pct}%;background:${fillColor}"></div>
        </div>
      </div>`;

    // Streak
    if (streak > 0) {
      html += `<div class="streak">${streak} day${streak > 1 ? 's' : ''} streak of 100% completion</div>`;
    }
  }

  // History
  html += `<div class="history-section${historyOpen ? ' open' : ''}" id="historySection">${renderHistory(settings.startDate)}</div>`;

  // Checklist
  if (weekNum > 0 && !isFuture) {
    html += '<div class="checklist">';
    for (const item of activeItems) {
      const isChecked = !!dayData[item.id];
      const isExpanded = expandedItems.has(item.id);
      html += `
        <div class="check-item${isChecked ? ' checked' : ''}" onclick="toggle('${dk}','${item.id}')">
          <div class="check-box">${isChecked ? '&#10003;' : ''}</div>
          <div class="check-label">${item.label}</div>
          ${weekNum <= item.week + 1 ? `<div class="check-week">Wk ${item.week}+</div>` : ''}
          <div class="check-expand${isExpanded ? ' open' : ''}" onclick="event.stopPropagation();toggleExpand('${item.id}')">&#9654;</div>
        </div>
        <div class="check-details${isExpanded ? ' open' : ''}">
          <ul>${item.details.map(d => '<li>' + d + '</li>').join('')}</ul>
          ${item.cbt && isExpanded ? renderCbtForm(item.cbt, dk) : ''}
        </div>`;
    }
    html += '</div>';
  } else if (isFuture) {
    html += '<div class="no-start"><p>Future date — check back then!</p></div>';
  }

  app.innerHTML = html;
}

function toggle(dk, id) {
  const data = getDayData(dk);
  data[id] = !data[id];
  saveDayData(dk, data);
  render();
}

function toggleExpand(id) {
  if (expandedItems.has(id)) expandedItems.delete(id);
  else expandedItems.add(id);
  render();
}

function prevDay() {
  currentDate = new Date(currentDate.getTime() - 86400000);
  render();
}

function nextDay() {
  currentDate = new Date(currentDate.getTime() + 86400000);
  render();
}

function goToday() {
  currentDate = today();
  render();
}

function calcStreak(startDateStr) {
  const startDate = parseDate(startDateStr);
  let streak = 0;
  let d = today();

  // Check today first - if nothing checked today, start from yesterday
  const todayItems = getActiveItems(getWeekNumber(startDate, d));
  const todayData = getDayData(dateKey(d));
  const todayChecked = todayItems.length > 0 && todayItems.every(i => todayData[i.id]);

  if (!todayChecked) {
    d = new Date(d.getTime() - 86400000);
  }

  while (d >= startDate) {
    const wk = getWeekNumber(startDate, d);
    if (wk < 1) break;
    const items = getActiveItems(wk);
    if (items.length === 0) break;
    const data = getDayData(dateKey(d));
    const allChecked = items.every(i => data[i.id]);
    if (allChecked) {
      streak++;
      d = new Date(d.getTime() - 86400000);
    } else {
      break;
    }
  }
  return streak;
}

// ---- History Calendar ----
function toggleHistory() {
  historyOpen = !historyOpen;
  render();
}

function renderHistory(startDateStr) {
  const startDate = parseDate(startDateStr);
  const y = historyMonth.getFullYear();
  const m = historyMonth.getMonth();
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  const firstDay = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const todayStr = dateKey(today());

  let html = '<div class="history-card">';
  html += `
    <div class="history-month-nav">
      <button onclick="histPrev()">&larr;</button>
      <span>${months[m]} ${y}</span>
      <button onclick="histNext()">&rarr;</button>
    </div>`;
  html += '<div class="cal-grid">';
  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d => {
    html += `<div class="cal-header">${d}</div>`;
  });

  for (let i = 0; i < firstDay; i++) {
    html += '<div class="cal-day empty"></div>';
  }

  for (let day = 1; day <= daysInMonth; day++) {
    const d = new Date(y, m, day);
    const dk = dateKey(d);
    const wk = getWeekNumber(startDate, d);
    const isToday = dk === todayStr;
    const isFuture = d > today();

    let cls = 'cal-day';
    if (isToday) cls += ' today';

    if (isFuture || wk < 1) {
      cls += ' no-data';
    } else {
      const items = getActiveItems(wk);
      const data = getDayData(dk);
      const checked = items.filter(i => data[i.id]).length;
      const total = items.length;
      if (total === 0) {
        cls += ' no-data';
      } else {
        const pct = checked / total;
        if (pct === 0 && Object.keys(data).length === 0) cls += ' no-data';
        else if (pct >= 0.75) cls += ' green';
        else if (pct >= 0.4) cls += ' yellow';
        else cls += ' red';
      }
    }

    html += `<div class="${cls}" onclick="goDate(${y},${m},${day})" style="cursor:pointer" title="${dk}">${day}</div>`;
  }

  html += '</div>';
  html += `
    <div class="cal-legend">
      <span><div class="dot" style="background:var(--green)"></div> 75%+</span>
      <span><div class="dot" style="background:var(--yellow)"></div> 40-74%</span>
      <span><div class="dot" style="background:var(--red)"></div> &lt;40%</span>
      <span><div class="dot" style="background:var(--progress-bg);opacity:0.4"></div> No data</span>
    </div>`;
  html += '</div>';
  return html;
}

function histPrev() {
  historyMonth = new Date(historyMonth.getFullYear(), historyMonth.getMonth() - 1, 1);
  render();
}

function histNext() {
  historyMonth = new Date(historyMonth.getFullYear(), historyMonth.getMonth() + 1, 1);

function goDate(y, m, d) {

}

  html += '</div>';
  screen.innerHTML = html;
  setTimeout(() => document.getElementById('profileNameInput').focus(), 50);
}

function loginProfile() {
  const name = document.getElementById('profileNameInput').value.trim();
  if (!name) return;
  setCurrentUser(name);
  hideProfilePicker();
}

function pickProfile(name) {
  setCurrentUser(name);
  hideProfilePicker();
}

function hideProfilePicker() {
  document.getElementById('profileScreen').style.display = 'none';
  document.querySelector('.header').style.display = 'flex';
  document.getElementById('app').style.display = 'block';
  render();
}

function switchUser() {
  closeSettings();
  showProfilePicker();
}

// ---- Export / Import ----
function exportData() {
  const prefix = currentUser + ':';
  const data = {};
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k.startsWith(prefix)) {
      data[k.slice(prefix.length)] = localStorage.getItem(k);
    }
  }
  const blob = new Blob([JSON.stringify({ user: currentUser, data }, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'health-tracker-' + currentUser.toLowerCase().replace(/\s+/g, '-') + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const json = JSON.parse(e.target.result);
      if (!json.data || !json.user) {
        alert('Invalid file format.');
        return;
      }
      if (confirm('Import data for "' + json.user + '"? This will merge with any existing data.')) {
        setCurrentUser(json.user);
        const prefix = json.user + ':';
        for (const [key, value] of Object.entries(json.data)) {
          localStorage.setItem(prefix + key, value);
        }
        closeSettings();
        render();
      }
    } catch {
      alert('Could not read file.');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ---- Init ----
if (!currentUser) {
  showProfilePicker();
} else {
  render();
}
</script>
</body>
</html>
